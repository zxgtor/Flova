# nginx reverse proxy: /api/* → api:8000, everything else → web:3000.
# Replace flova.example.com with your real host.

upstream flova_api {
  server api:8000;
}

upstream flova_web {
  server web:3000;
}

# Plain HTTP redirects to HTTPS.
server {
  listen 80;
  server_name flova.example.com;

  # Let's Encrypt HTTP challenge path stays on :80.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name flova.example.com;

  ssl_certificate     /etc/letsencrypt/live/flova.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/flova.example.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Allow large multipart uploads (matches API's 50 MB limit + headroom).
  client_max_body_size 64m;

  # API routes
  location /api/ {
    proxy_pass         http://flova_api;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 600;  # long polls + large downloads
  }

  # Stripe webhook needs the raw body for signature verification; nginx forwards
  # it untouched by default — keep this block separate so we never enable buffering.
  location /api/billing/webhook {
    proxy_pass         http://flova_api;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_request_buffering off;
  }

  # Frontend
  location / {
    proxy_pass         http://flova_web;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}
