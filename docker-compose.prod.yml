# Production overrides.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Assumes you have:
#   - A domain pointing at this server.
#   - HTTPS terminated by nginx (cert path in deploy/nginx.conf).
#   - .env populated with real secrets.

services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped
    # Don't publish 8000 to the public internet; nginx fronts it.
    ports: []
    expose:
      - "8000"

  worker:
    restart: unless-stopped

  web:
    restart: unless-stopped
    ports: []
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount your TLS materials here. Easiest: certbot writes here.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - web
