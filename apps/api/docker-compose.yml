services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flova
      POSTGRES_PASSWORD: flova
      POSTGRES_DB: flova
    ports: ["5432:5432"]
    volumes:
      - pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pg:
