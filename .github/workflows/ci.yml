name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web — test / typecheck / lint / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  api:
    name: api — pytest / mypy / ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: uv pip install --system -e ".[dev]"
      - name: Pytest
        run: pytest
      - name: Ruff
        run: ruff check .
      - name: Mypy (best-effort, non-blocking)
        continue-on-error: true
        run: mypy src

  docker:
    name: docker — build api + web images
    runs-on: ubuntu-latest
    needs: [web, api]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          tags: flova-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: false
          tags: flova-web:ci
          build-args: NEXT_PUBLIC_API_BASE=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max
